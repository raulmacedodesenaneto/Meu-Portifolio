<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Education</title>
    <style>
        body {
            background-color: #111;
            color: #fff;
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .nav {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 15px;
            background-color: #282828;
            position: sticky;
            top: 0;
            z-index: 100;
            flex-wrap: wrap;
            gap: 15px;
            font-size: 1.2em;
        }

        .nav a {
            text-decoration: none;
            color: #fff;
            transition: color 0.3s;
        }

        .nav a:hover {
            color: #00d1b2;
        }

        .container {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            max-width: 1200px;
            width: 100%;
            gap: 20px;
            margin: auto;
        }

        .text-content {
            flex: 1;
            padding: 20px;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 20px;
            font-weight: bold;
        }

        p {
            font-size: 1.5em;
            margin-bottom: 20px;
        }

        .image {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .image img {
            width: 100%;
            max-width: 500px;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
        }

        .contact-info {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            background-color: #282828;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: auto;
            font-size: 1em;
        }

        .contact-info a {
            color: #00d1b2;
            text-decoration: none;
            transition: color 0.3s;
        }

        .contact-info a:hover {
            color: #fff;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column-reverse;
                align-items: center;
                text-align: center;
            }

            .text-content {
                padding: 0;
            }

            h1 {
                font-size: 2.5em;
            }

            p {
                font-size: 1.2em;
            }

            .nav {
                font-size: 1em;
                gap: 10px;
            }

            .image img {
                max-width: 300px;
                margin: 20px 0;
            }

            .contact-info {
                font-size: 0.9em;
                padding: 10px;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 2em;
            }

            p {
                font-size: 1em;
            }

            .nav {
                font-size: 0.9em;
                gap: 8px;
            }

            .image img {
                max-width: 250px;
            }
        }
    </style>
</head>
<body>
    <div class="nav">
        <a href=".html">My Work</a>
        <a href="2.html">About Me</a>
        <a href="3.html">Education</a>
        <a href="4.html">Work Experience</a>
        <a href="5.html">Cover</a>
    </div>

    <div class="container">
        <div class="image">
            <img src="https://cdn-icons-png.flaticon.com/128/644/644617.png" alt="Student studying">
        </div>
        <div class="text-content">
            <h1>EDUCATION</h1>
            <p>Faculdade de Ciência da Computação</p>
            <p>Uninorte-AM/2025</p>
        </div>
    </div>

    <div class="contact-info">
        <a href="mailto:raulneto213@gmail.com">raulneto213@gmail.com</a>
        <a href="mailto:raulneto213321@gmail.com">raulneto213321@gmail.com</a>
        <a href="tel:+559293100355">+55 92 9310-0355</a>
    </div>
</body>
</html>
