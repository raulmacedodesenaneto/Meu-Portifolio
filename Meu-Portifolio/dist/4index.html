<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Education</title>
    <style>
        body {
            background-color: #181818;
            color: #fff;
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .nav {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 15px;
            background-color: #282828;
            position: sticky;
            top: 0;
            z-index: 100;
            flex-wrap: wrap;
            gap: 15px;
        }

        .nav a {
            color: #fff;
            text-decoration: none;
            margin: 0 15px;
            font-size: 18px;
            transition: color 0.3s;
        }

        .nav a:hover {
            color: #00d1b2;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
        }

        .content {
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.2em;
            line-height: 1.5;
            margin-bottom: 15px;
        }

        .image {
            max-width: 400px;
            margin: 20px auto;
        }

        .image img {
            width: 100%;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
        }

        .footer {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            background-color: #282828;
            width: 100%;
        }

        .dot {
            height: 10px;
            width: 10px;
            background-color: #fff;
            border-radius: 50%;
            margin: 0 5px;
            transition: all 0.3s;
        }

        .dot.active {
            height: 15px;
            width: 15px;
            background-color: #00d1b2;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
        }

        .contact-info {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            background-color: #282828;
            flex-wrap: wrap;
            gap: 15px;
        }

        .contact-info a {
            color: #00d1b2;
            text-decoration: none;
            font-size: 1em;
            transition: color 0.3s;
        }

        .contact-info a:hover {
            color: #fff;
        }

        /* Mobile view adjustments */
        @media (max-width: 768px) {
            .nav a {
                font-size: 16px;
                margin: 0 10px;
            }

            h1 {
                font-size: 2em;
            }

            p {
                font-size: 1em;
            }

            .image {
                max-width: 300px;
                margin: 15px auto;
            }

            .contact-info {
                gap: 10px;
                padding: 10px;
                font-size: 0.9em;
            }

            .footer {
                padding: 10px;
            }
        }

        @media (max-width: 480px) {
            .nav a {
                font-size: 14px;
                margin: 0 5px;
            }

            h1 {
                font-size: 1.8em;
            }

            p {
                font-size: 0.9em;
            }

            .image {
                max-width: 250px;
            }

            .contact-info a {
                font-size: 0.9em;
            }
        }
    </style>
</head>
<body>

    <div class="nav">
        <a href=".html">My Work</a>
        <a href="2.html">About Me</a>
        <a href="3.html">Education</a>
        <a href="4.html">Work Experience</a>
        <a href="5.html">Cover</a>
    </div>

    <div class="container">
        <div class="content">
            <h1>Work Experience</h1>
            <p>Estagiário - Professor de informática básica</p>
            <p>Digital Amazônia</p>
        </div>
        <div class="image">
            <img src="https://cdn-icons-png.flaticon.com/128/5193/5193770.png" alt="Graduate student">
        </div>
    </div>

    <div class="contact-info">
        <a href="mailto:raulneto213@gmail.com">raulneto213@gmail.com</a>
        <a href="mailto:raulneto213321@gmail.com">raulneto213321@gmail.com</a>
        <a href="tel:+559293100355">+55 92 9310-0355</a>
    </div>

    <div class="footer">
        <div class="pagination">
            <span class="dot"></span>
            <span class="dot active"></span>
            <span class="dot"></span>
        </div>
    </div>

</body>
</html>
