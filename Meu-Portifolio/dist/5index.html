<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 20px;
            background-color: #282828;
            position: fixed;
            top: 0;
            z-index: 10;
            flex-wrap: wrap;
        }

        .nav a {
            color: #fff;
            text-decoration: none;
            margin: 0 10px;
            font-size: 18px;
            transition: color 0.3s;
        }

        .nav a:hover {
            color: #00d1b2;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            width: 100%;
            max-width: 1200px;
            padding: 20px;
            margin-top: 100px; /* Ajusta o espaçamento após a navegação fixa */
        }

        .container div {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 20px;
        }

        .container img {
            width: 120px;
            height: auto;
            margin-bottom: 10px;
            transition: transform 0.3s;
        }

        .container img:hover {
            transform: scale(1.05);
        }

        .container p {
            text-align: center;
            font-size: 1.2em;
        }

        .contact-info {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            background-color: #282828;
            gap: 20px;
            margin-top: 30px;
            width: 100%;
            flex-wrap: wrap;
        }

        .contact-info a {
            color: #00d1b2;
            text-decoration: none;
            transition: text-decoration 0.3s;
        }

        .contact-info a:hover {
            text-decoration: underline;
        }

        /* Responsividade para dispositivos móveis */
        @media (max-width: 768px) {
            .nav {
                padding: 15px;
                justify-content: center;
            }

            .nav a {
                font-size: 16px;
                margin: 0 5px;
            }

            .container div {
                margin: 15px 0;
            }

            .container img {
                width: 100px;
            }

            .container p {
                font-size: 1em;
            }

            .contact-info {
                flex-direction: column;
                gap: 10px;
                padding: 10px;
            }
        }

        @media (max-width: 480px) {
            .nav a {
                font-size: 14px;
                margin: 0 3px;
            }

            .container img {
                width: 80px;
            }

            .container p {
                font-size: 0.9em;
            }

            .contact-info a {
                font-size: 0.9em;
            }
        }
    </style>
</head>
<body>
